name: Ruby CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ${{matrix.os}}-latest
    strategy:
      matrix:
        os:
          - ubuntu
          - windows
        ruby-version:
          - "3.0"
          - "3.1"
          - "3.2"
          - "3.3"
          - "3.4"
          - "4.0"

    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
      # Verify the packaged gem installs on Windows, not just the development bundle.
      - name: Verify gem install
        if: matrix.os == 'windows'
        shell: bash
        run: |
          gem build github_changelog_generator.gemspec
          gem install ./github_changelog_generator-*.gem
      - name: Run tests
        run: bundle exec rake
